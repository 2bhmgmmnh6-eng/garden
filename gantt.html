    // Stores your API key + bin ID in localStorage on each device.
    // Data (checked tasks + promoted optional) lives in JSONBin cloud.

    const LS_KEY    = "garden-jsonbin-key";
    const LS_BIN    = "garden-jsonbin-bin";
    const JSONBIN   = "https://api.jsonbin.io/v3";

    function lsGet(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(_) { return fb; } }
    function lsSet(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch(_) {} }

    async function binCreate(apiKey, data) {
      const r = await fetch(`${JSONBIN}/b`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Master-Key": apiKey, "X-Bin-Name": "garden-gantt", "X-Bin-Private": "true" },
        body: JSON.stringify(data),
      });
      if (!r.ok) throw new Error("Create failed: " + r.status);
      const j = await r.json();
      return j.metadata.id;
    }

    async function binRead(apiKey, binId) {
      const r = await fetch(`${JSONBIN}/b/${binId}/latest`, {
        headers: { "X-Master-Key": apiKey },
      });
      if (!r.ok) throw new Error("Read failed: " + r.status);
      const j = await r.json();
      return j.record;
    }

    async function binWrite(apiKey, binId, data) {
      const r = await fetch(`${JSONBIN}/b/${binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": apiKey },
        body: JSON.stringify(data),
      });
      if (!r.ok) throw new Error("Write failed: " + r.status);
    }

      const s = monthToWeek(task.start[0], task.start[1]);

    function weekToMonthDay(week) {
      let w = 0;
      for (let i = 0; i < 12; i++) {
        if (w + WPM[i] > week) {
          const day = Math.max(1, Math.round(((week - w) / WPM[i]) * 30));
          return [i, Math.min(day, 28)];
        }
        w += WPM[i];
      }
      return [11, 28];
    }

    function GardenGantt() {
      // Sync state
      const [apiKey,    setApiKey]    = useState(() => lsGet(LS_KEY, null));
      const [binId,     setBinId]     = useState(() => lsGet(LS_BIN, null));
      const [syncReady, setSyncReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState(""); // "", "saving", "saved", "error"
      const saveTimer = useRef(null);

      // App state
      const [checkedTasks,     setCheckedTasks]     = useState({});
      const [promotedOptional, setPromotedOptional] = useState({});
      const [categoryFilter,   setCategoryFilter]   = useState("All");
      const [taskFilter,       setTaskFilter]       = useState("All");
      const [locationFilter,   setLocationFilter]   = useState("All");
      const [search,           setSearch]           = useState("");
      const [showFrost,        setShowFrost]        = useState(true);
      const [showNotes,        setShowNotes]        = useState(false);
      const [popover,          setPopover]          = useState(null);
      const [showSyncSettings, setShowSyncSettings] = useState(false);
      const [taskOverrides,    setTaskOverrides]    = useState({}); // key -> {start:[m,d], end:[m,d]}
      const [doneOn,           setDoneOn]           = useState({}); // key -> "Mar 10" 
      const [cascadeToast,     setCascadeToast]     = useState(null); // {msg, prev} for undo
      const cascadeToastTimer  = useRef(null);

      const now = new Date();
      const currentWeek = Math.floor((now - new Date(now.getFullYear(),0,1)) / (7*24*60*60*1000));
      const CELL_W  = 14;
      const ROW_H   = 28;
      const LABEL_W = showNotes ? 280 : 175;

      // Load from cloud on mount
      useEffect(() => {
        if (!apiKey || !binId) return;
        binRead(apiKey, binId).then(data => {
          if (data?.checked)   setCheckedTasks(data.checked);
          if (data?.promoted)  setPromotedOptional(data.promoted);
          if (data?.overrides) setTaskOverrides(data.overrides);
          if (data?.doneOn)    setDoneOn(data.doneOn);
          setSyncReady(true);
          setSyncStatus("saved");
        }).catch(() => {
          setSyncReady(true);
          setSyncStatus("error");
        });
      }, [apiKey, binId]);

      // Debounced save to cloud whenever data changes
      const saveToCloud = useCallback((checked, promoted, overrides, doneOn) => {
        if (!apiKey || !binId) return;
        clearTimeout(saveTimer.current);
        setSyncStatus("saving");
        saveTimer.current = setTimeout(async () => {
          try {
            await binWrite(apiKey, binId, { checked, promoted, overrides, doneOn });
            setSyncStatus("saved");
          } catch(_) {
            setSyncStatus("error");
          }
        }, 1200);
      }, [apiKey, binId]);

      const toggleTask = useCallback((key, plant, taskIdx) => {
        const today = new Date();
        const dateStr = MONTHS[today.getMonth()] + " " + today.getDate();
        const todayWeek = Math.floor((today - new Date(today.getFullYear(),0,1)) / (7*24*60*60*1000));

        setCheckedTasks(prev => {
          const newChecked = {...prev};
          if (newChecked[key]) {
            // Unchecking — just remove
            delete newChecked[key];
            setDoneOn(d => { const nd={...d}; delete nd[key]; saveToCloud(newChecked, promotedOptional, taskOverrides, nd); return nd; });
            return newChecked;
          }

          // Checking — record completion date
          newChecked[key] = true;
          const newDoneOn = {...doneOn, [key]: dateStr};

          // Cascade logic — only if plant and taskIdx provided
          let newOverrides = {...taskOverrides};
          let cascadeCount = 0;
          let prevOverrides = {...taskOverrides};

          if (plant && taskIdx !== undefined) {
            const task = plant.tasks[taskIdx];
            if (task && !NO_CASCADE.has(task.type)) {
              // Get effective end of this task
              const ov = taskOverrides[key];
              const effEnd = ov ? monthDayToWeek(ov.end[0], ov.end[1]) : monthDayToWeek(task.end[0], task.end[1]);
              const schedEnd = monthDayToWeek(task.end[0], task.end[1]);
              // How late is completion? Use today vs scheduled end
              const delayWeeks = Math.max(0, todayWeek - schedEnd);

              if (delayWeeks > 0) {
                // Cascade all subsequent tasks for this plant that are not NO_CASCADE
                for (let i = taskIdx + 1; i < plant.tasks.length; i++) {
                  const nextTask = plant.tasks[i];
                  if (NO_CASCADE.has(nextTask.type)) continue;
                  const nextKey = tKey(plant.name, i);
                  if (newChecked[nextKey]) continue; // already done, skip
                  const existOv = newOverrides[nextKey];
                  const baseStart = existOv ? existOv.start : nextTask.start;
                  const baseEnd   = existOv ? existOv.end   : nextTask.end;
                  const startWeek = monthDayToWeek(baseStart[0], baseStart[1]);
                  const endWeek   = monthDayToWeek(baseEnd[0],   baseEnd[1]);
                  const newStartWeek = Math.min(startWeek + delayWeeks, 51);
                  const newEndWeek   = Math.min(endWeek   + delayWeeks, 52);
                  newOverrides[nextKey] = {
                    start: weekToMonthDay(newStartWeek),
                    end:   weekToMonthDay(newEndWeek),
                  };
                  cascadeCount++;
                }
              }
            }
          }

          setTaskOverrides(newOverrides);
          setDoneOn(_ => { saveToCloud(newChecked, promotedOptional, newOverrides, newDoneOn); return newDoneOn; });

          if (cascadeCount > 0) {
            clearTimeout(cascadeToastTimer.current);
            setCascadeToast({ msg: `${cascadeCount} following task${cascadeCount>1?"s":""} shifted by ${Math.round((todayWeek - monthDayToWeek(plant.tasks[taskIdx].end[0], plant.tasks[taskIdx].end[1]))*7)} days`, prevOverrides });
            cascadeToastTimer.current = setTimeout(() => setCascadeToast(null), 6000);
          }

          return newChecked;
        });
      }, [promotedOptional, saveToCloud, taskOverrides, doneOn, cascadeToastTimer]);

      const promoteOptional = useCallback((plantName) => {
        setPromotedOptional(prev => {
          const n = {...prev, [plantName]: true};
          saveToCloud(checkedTasks, n, taskOverrides, doneOn);
          return n;
        });
      }, [checkedTasks, saveToCloud, taskOverrides, doneOn]);

      const updateOverride = useCallback((key, start, end) => {
        setTaskOverrides(prev => {
          const n = {...prev, [key]: {start, end}};
          saveToCloud(checkedTasks, promotedOptional, n, doneOn);
          return n;
        });
      }, [checkedTasks, promotedOptional, saveToCloud, doneOn]);

      const allActivePlants = useMemo(() => {
        const promoted = OPTIONAL_PLANTS.filter(p => promotedOptional[p.name]).map(p => ({...p, category: p.targetCategory}));
        return [...PLANTS, ...promoted];
      }, [promotedOptional]);

      const optionalPlants = useMemo(() =>
        OPTIONAL_PLANTS.filter(p => !promotedOptional[p.name]).map(p => ({...p, category:"Optional"})),
      [promotedOptional]);

      const combinedPlants = useMemo(() => [...allActivePlants, ...optionalPlants], [allActivePlants, optionalPlants]);

      const urgentPlants = useMemo(() =>
        combinedPlants.filter(p => p.tasks.some(t => t.label?.includes("in hand"))).map(p => p.name),
      [combinedPlants]);

      const filteredPlants = useMemo(() => combinedPlants.filter(p => {
        if (categoryFilter !== "All" && p.category !== categoryFilter) return false;
        if (locationFilter === "front (south)" && p.location !== "front") return false;
        if (locationFilter === "back (north)"  && p.location !== "back")  return false;
        if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
        if (taskFilter !== "All" && !p.tasks.some(t => t.type === taskFilter)) return false;
        return true;
      }), [combinedPlants, categoryFilter, taskFilter, locationFilter, search]);

      const totalTasks = useMemo(() => allActivePlants.reduce((s,p) => s + p.tasks.length, 0), [allActivePlants]);
      const doneTasks  = Object.keys(checkedTasks).length;

      function handleSetup(key, bid, data) {
        setApiKey(key);
        setBinId(bid);
        setCheckedTasks(data.checked || {});
        setPromotedOptional(data.promoted || {});
        setTaskOverrides(data.overrides || {});
        setDoneOn(data.doneOn || {});
        setSyncReady(true);
        setSyncStatus("saved");
      }

      // Show setup screen if no credentials yet
      if (!apiKey || !binId) {
        return <SetupBanner onSave={handleSetup} />;
      }

      // Show loading while fetching initial data
      if (!syncReady) {
        return (
          <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12 }}>
            <div style={{ fontSize:32 }}>🌱</div>
            <div style={{ fontSize:14,color:"#6b7259" }}>Loading your garden…</div>
          </div>
        );
      }

      function openPopover(e, plant, taskIdx, task, isOpt) {
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        const popH = 260;
        const y = rect.top - 10 > popH ? rect.top - popH - 4 : rect.bottom + 6;
        const x = Math.min(Math.max(rect.left, 8), window.innerWidth - 300);
        setPopover({ plant, taskIndex: taskIdx, task, isOptional: isOpt, x, y });
      }

      const syncIndicator = {
        saving: { color:"#d97706", icon:"⟳", text:"Saving…" },
        saved:  { color:"#16a34a", icon:"✓", text:"Synced" },
        error:  { color:"#dc2626", icon:"!", text:"Sync error" },
      }[syncStatus] || null;

      return (
        <div style={{ fontFamily:"Georgia,serif", background:"#fafaf7", minHeight:"100vh", padding:"18px 16px" }}
          onClick={() => setPopover(null)}>

          {cascadeToast && (
            <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", zIndex:3000,
              background:"#1c2b1a", color:"#fff", borderRadius:10, padding:"11px 18px",
              display:"flex", alignItems:"center", gap:14, boxShadow:"0 4px 20px rgba(0,0,0,0.3)",
              fontSize:12, fontWeight:600, whiteSpace:"nowrap" }}>
              <span>📅 {cascadeToast.msg}</span>
              <button onClick={() => {
                setTaskOverrides(cascadeToast.prevOverrides);
                saveToCloud(checkedTasks, promotedOptional, cascadeToast.prevOverrides, doneOn);
                setCascadeToast(null);
              }} style={{ background:"#fff", color:"#1c2b1a", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                Undo
              </button>
              <button onClick={() => setCascadeToast(null)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.6)", fontSize:16, cursor:"pointer", padding:0, lineHeight:1 }}>×</button>
            </div>
          )}

          {showSyncSettings && (
            <SyncSettingsModal
              apiKey={apiKey}
              binId={binId}
              onClose={() => setShowSyncSettings(false)}
              onReset={() => { lsSet(LS_KEY,null); lsSet(LS_BIN,null); location.reload(); }}
            />
          )}

          {popover && (
            <div style={{ position:"fixed", left:popover.x, top:popover.y, zIndex:1000 }} onClick={e => e.stopPropagation()}>
              <TaskPopover
                plant={popover.plant}
                taskKey={tKey(popover.plant.name, popover.taskIndex)}
                task={popover.task}
                isOptional={popover.isOptional}
                isChecked={!!checkedTasks[tKey(popover.plant.name, popover.taskIndex)]}
                doneOnDate={doneOn[tKey(popover.plant.name, popover.taskIndex)]}
                override={taskOverrides[tKey(popover.plant.name, popover.taskIndex)]}
                onToggle={() => toggleTask(tKey(popover.plant.name, popover.taskIndex), popover.plant, popover.taskIndex)}
                onUpdateDates={(start, end) => {
                  const k = tKey(popover.plant.name, popover.taskIndex);
                  if (start === null) {
                    setTaskOverrides(prev => { const n={...prev}; delete n[k]; saveToCloud(checkedTasks, promotedOptional, n, doneOn); return n; });
                  } else {
                    updateOverride(k, start, end);
                  }
                }}
                onClose={() => setPopover(null)}
              />
            </div>
          )}

          {/* Header */}
          <div style={{ marginBottom:14, display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div>
              <h1 style={{ fontSize:22, fontWeight:700, color:"#1c2b1a", margin:0 }}>🌱 Garden Gantt Calendar</h1>
              <p style={{ color:"#6b7259", fontSize:12, margin:"3px 0 0", fontStyle:"italic" }}>
                Zone 8b · Cottage Lake, WA · 430 ft · {combinedPlants.length} plants · Ed Hume Seeds
                &nbsp;·&nbsp;<span style={{ color:"#16a34a",fontWeight:600 }}>☀ Front yard</span> last frost Mar 22
                &nbsp;·&nbsp;<span style={{ color:"#0891b2",fontWeight:600 }}>🌿 Back deck</span> last frost Apr 1
                {syncIndicator && (
                  <span style={{ marginLeft:10, color:syncIndicator.color, fontStyle:"normal", fontWeight:600 }}>
                    {syncIndicator.icon} {syncIndicator.text}
                  </span>
                )}
              </p>
            </div>
            <div style={{
              background:doneTasks>0?"#f0fdf4":"#f8fafc",
              border:`1.5px solid ${doneTasks>0?"#16a34a":"#e5e7eb"}`,
              borderRadius:20, padding:"6px 14px",
              display:"flex", alignItems:"center", gap:8, flexShrink:0,
            }}>
              <span style={{ fontSize:11, color:doneTasks>0?"#16a34a":"#94a3b8", fontWeight:700 }}>
                ✓ {doneTasks} / {totalTasks} tasks done
              </span>
              <div style={{ width:80,height:6,borderRadius:3,background:"#e5e7eb",overflow:"hidden" }}>
                <div style={{ height:"100%",borderRadius:3,background:"#16a34a",width:`${totalTasks?(doneTasks/totalTasks)*100:0}%`,transition:"width 0.3s ease" }}/>
              </div>
              {doneTasks > 0 && (
                <button onClick={e => { e.stopPropagation(); const n = {}; setCheckedTasks(n); setDoneOn({}); saveToCloud(n, promotedOptional, taskOverrides, {}); }}
                  style={{ fontSize:10,color:"#dc2626",background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline" }}>
                  reset
                </button>
              )}
            </div>
          </div>

          {urgentPlants.length > 0 && (
            <div style={{ background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:12,color:"#713f12" }}>
              <strong>⚠️ Pot up now!</strong> These starts are in hand:&nbsp;{urgentPlants.join(" · ")}
            </div>
          )}

          {/* Legend */}
          <div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:10 }}>
            {Object.entries(TASK_COLORS).map(([type,c]) => (
              <div key={type} style={{ display:"flex",alignItems:"center",gap:4,fontSize:10,background:"#fff",border:"1px solid #e5e7eb",borderRadius:20,padding:"2px 8px" }}>
                <div style={{ width:8,height:8,borderRadius:2,background:c.bg }}/>
                <span style={{ color:"#374151" }}>{type}</span>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:12,alignItems:"center" }}>
            <input placeholder="🔍 Search..." value={search} onChange={e => setSearch(e.target.value)}
              style={{ padding:"5px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:12,width:140,outline:"none",background:"#fff" }}/>
            <div style={{ display:"flex",gap:3,flexWrap:"wrap" }}>
              {FILT_CATEGORIES.map(c => (
                <button key={c} onClick={() => setCategoryFilter(c)}
                  style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                    borderColor:categoryFilter===c?(CATEGORY_COLORS[c]||"#64748b"):"#d1d5db",
                    background:categoryFilter===c?(CAT_BG[c]||"#f1f5f9"):"#fff",
                    color:"#1c2b1a",fontWeight:categoryFilter===c?700:400 }}>
                  {c==="Optional"?"🤔 Optional":c}
                </button>
              ))}
            </div>
            <select value={taskFilter} onChange={e => setTaskFilter(e.target.value)}
              style={{ padding:"5px 8px",borderRadius:8,border:"1px solid #d1d5db",fontSize:11,background:"#fff",color:"#374151" }}>
              {TASK_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
            <select value={locationFilter} onChange={e => setLocationFilter(e.target.value)}
              style={{ padding:"5px 8px",borderRadius:8,border:"1px solid #d1d5db",fontSize:11,background:"#fff",color:"#374151" }}>
              {LOCATIONS.map(l => <option key={l}>{l}</option>)}
            </select>
            <button onClick={() => setShowFrost(f => !f)}
              style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                borderColor:showFrost?"#16a34a":"#d1d5db",background:showFrost?"#dcfce7":"#fff",
                color:showFrost?"#14532d":"#374151",fontWeight:showFrost?700:400 }}>
              🌡 Frost dates
            </button>
            <button onClick={() => setShowNotes(n => !n)}
              style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                borderColor:showNotes?"#7c3aed":"#d1d5db",background:showNotes?"#ede9fe":"#fff",
                color:showNotes?"#4c1d95":"#374151",fontWeight:showNotes?700:400 }}>
              📋 Variety notes
            </button>
            <span style={{ fontSize:11,color:"#9ca3af" }}>{filteredPlants.length} plants shown</span>
          </div>

          {/* Grid */}
          <div style={{ background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"auto",boxShadow:"0 1px 6px rgba(0,0,0,0.07)" }}>
            <div style={{ display:"flex", minWidth: LABEL_W + TOTAL_WEEKS*CELL_W + 20 }}>

              {/* Label column */}
              <div style={{ width:LABEL_W,flexShrink:0,borderRight:"1px solid #e5e7eb" }}>
                <div style={{ height:40 }}/>
                {ALL_CATEGORIES.map(cat => {
                  const plants = filteredPlants.filter(p => p.category === cat);
                  if (!plants.length) return null;
                  const isOptCat = cat === "Optional";
                  return (
                    <div key={cat}>
                      <div style={{ height:22,background:CAT_BG[cat]||"#f1f5f9",display:"flex",alignItems:"center",
                        paddingLeft:10,fontSize:10,fontWeight:800,color:"#374151",
                        letterSpacing:"0.06em",textTransform:"uppercase",borderTop:"1px solid #e5e7eb",
                        borderLeft:"3px solid "+(CATEGORY_COLORS[cat]||"#94a3b8") }}>
                        {isOptCat?"🤔 Optional — click ✚ to plant this year":cat}
                      </div>
                      {plants.map(plant => {
                        const optDef    = OPTIONAL_PLANTS.find(o => o.name === plant.name);
                        const isOpt     = isOptCat && !!optDef;
                        const plantDone = plant.tasks.filter((_,ti) => checkedTasks[tKey(plant.name,ti)]).length;
                        const allDone   = !isOpt && plantDone === plant.tasks.length;
                        return (
                          <div key={plant.name} style={{ height:ROW_H,display:"flex",alignItems:"center",
                            paddingLeft:10,borderBottom:"1px solid #f3f4f6",
                            background:allDone?"#f0fdf4":urgentPlants.includes(plant.name)?"#fefce8":isOpt?"#f8fafc":"transparent" }}>
                            {isOpt && (
                              <button title={`Plant this year → ${optDef.targetCategory}`}
                                onClick={e => { e.stopPropagation(); promoteOptional(plant.name); }}
                                style={{ flexShrink:0,marginRight:5,width:18,height:18,borderRadius:"50%",border:"1.5px solid #16a34a",background:"#f0fdf4",color:"#16a34a",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,padding:0 }}>
                                ✚
                              </button>
                            )}
                            <span style={{ fontSize:9,opacity:isOpt?0.5:0.6,marginRight:4,flexShrink:0 }}>
                              {plant.location==="front"?"☀️":"🌿"}
                            </span>
                            <div style={{ overflow:"hidden",flex:1 }}>
                              <div style={{ fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                                color:allDone?"#16a34a":isOpt?"#94a3b8":"#1c2b1a",
                                fontStyle:isOpt?"italic":"normal",textDecoration:allDone?"line-through":"none" }}>
                                {plant.name}{urgentPlants.includes(plant.name)?" ⚠️":""}{allDone?" ✓":""}
                              </div>
                              {isOpt && <div style={{ fontSize:9,color:"#cbd5e1" }}>→ {optDef.targetCategory} if planted</div>}
                              {!isOpt && plantDone>0 && !allDone && <div style={{ fontSize:9,color:"#16a34a" }}>{plantDone}/{plant.tasks.length} done</div>}
                              {!isOpt && showNotes && plant.notes && <div style={{ fontSize:9,color:"#9ca3af",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2 }}>{plant.notes}</div>}
                              {isOpt  && showNotes && plant.notes && <div style={{ fontSize:9,color:"#cbd5e1",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2 }}>{plant.notes}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              {/* Gantt column */}
              <div style={{ flex:1,overflowX:"auto",position:"relative" }}>
                <div style={{ display:"flex",height:40,alignItems:"flex-end",borderBottom:"2px solid #e5e7eb",position:"sticky",top:0,background:"#fff",zIndex:10 }}>
                  {MONTHS.map((m,i) => (
                    <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,borderLeft:"1px solid #e5e7eb",paddingLeft:4,paddingBottom:6 }}>
                      <span style={{ fontSize:11,fontWeight:700,color:"#374151" }}>{m}</span>
                    </div>
                  ))}
                </div>

                {showFrost && <>
                  <div style={{ position:"absolute",top:0,bottom:0,left:0,width:FRONT_LF*CELL_W,background:"rgba(22,163,74,0.05)",pointerEvents:"none",zIndex:0 }}/>
                  <div style={{ position:"absolute",top:0,bottom:0,left:FRONT_FF*CELL_W,right:0,background:"rgba(22,163,74,0.05)",pointerEvents:"none",zIndex:0 }}/>
                  {[
                    {x:FRONT_LF,color:"#16a34a",label:"LF Mar 22 ☀",top:2},
                    {x:FRONT_FF,color:"#16a34a",label:"FF Nov 8 ☀", top:2},
                    {x:BACK_LF, color:"#0891b2",label:"LF Apr 1 🌿",top:14},
                    {x:BACK_FF, color:"#0891b2",label:"FF Nov 1 🌿",top:14},
                  ].map(({x,color,label,top}) => (
                    <div key={label} style={{ position:"absolute",top:0,bottom:0,left:x*CELL_W,width:1,background:color,opacity:0.35,pointerEvents:"none",zIndex:1 }}>
                      <div style={{ position:"absolute",top,left:2,background:color,color:"#fff",fontSize:8,fontWeight:700,borderRadius:3,padding:"1px 3px",whiteSpace:"nowrap",opacity:0.9 }}>{label}</div>
                    </div>
                  ))}
                </>}

                {ALL_CATEGORIES.map(cat => {
                  const plants = filteredPlants.filter(p => p.category === cat);
                  if (!plants.length) return null;
                  const isOptCat = cat === "Optional";
                  return (
                    <div key={cat}>
                      <div style={{ height:22,background:CAT_BG[cat]||"#f1f5f9",borderTop:"1px solid #e5e7eb",display:"flex" }}>
                        {MONTHS.map((m,i) => <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,borderLeft:"1px solid #e5e7eb" }}/>)}
                      </div>
                      {plants.map(plant => {
                        const tasksToShow = taskFilter==="All" ? plant.tasks : plant.tasks.filter(t => t.type===taskFilter);
                        return (
                          <div key={plant.name} style={{ height:ROW_H,position:"relative",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",
                            background:urgentPlants.includes(plant.name)?"#fefce8":isOptCat?"#f8fafc":"transparent" }}>
                            {MONTHS.map((m,i) => <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,height:"100%",borderLeft:"1px solid #f3f4f6",boxSizing:"border-box" }}/>)}
                            {tasksToShow.map((task,ti) => {
                              const origIdx  = plant.tasks.indexOf(task);
                              const key      = tKey(plant.name, origIdx);
                              const isDone   = !!checkedTasks[key];
                              const ov       = taskOverrides[key];
                              const effTask  = ov ? {...task, start: ov.start, end: ov.end} : task;
                              const {start,end} = taskWeeks(effTask);
                              const origWeeks = taskWeeks(task);
                              const color    = TASK_COLORS[task.type] || TASK_COLORS["Harvest"];
                              const label    = task.label || task.type;
                              const isActive = popover?.plant.name===plant.name && popover?.taskIndex===origIdx;
                              const w        = Math.max((end-start)*CELL_W - 2, 4);
                              const duration = origWeeks.end - origWeeks.start;

                              function startDrag(e) {
                                if (isOptCat) return;
                                e.preventDefault();
                                const isTouch = e.type === "touchstart";
                                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                                const startWeek = start;
                                let dragged = false;

                                function onMove(me) {
                                  const cx = isTouch ? me.touches[0].clientX : me.clientX;
                                  const delta = Math.round((cx - startX) / CELL_W);
                                  if (delta !== 0) dragged = true;
                                  const newStart = Math.max(0, Math.min(TOTAL_WEEKS - duration, startWeek + delta));
                                  const newEnd   = newStart + duration;
                                  // Convert weeks back to month/day for preview — stored in dragPreview
                                  window._dragPreview = { key, newStart, newEnd };
                                  // Force re-render by updating a ref-based approach — simpler: just update on drop
                                }
                                function onUp(ue) {
                                  document.removeEventListener(isTouch?"touchmove":"mousemove", onMove);
                                  document.removeEventListener(isTouch?"touchend":"mouseup", onUp);
                                  if (!dragged) { openPopover(ue.changedTouches?ue:ue, plant, origIdx, task, isOptCat); return; }
                                  if (window._dragPreview && window._dragPreview.key === key) {
                                    const {newStart} = window._dragPreview;
                                    delete window._dragPreview;
                                    // Convert week back to approx month/day
                                    let w2 = 0, mo = 0;
                                    for (let i=0; i<12; i++) { if (w2 + WPM[i] > newStart) { mo=i; break; } w2+=WPM[i]; }
                                    const dayFrac = (newStart - w2) / WPM[mo];
                                    const day = Math.max(1, Math.round(dayFrac * 30));
                                    let we = 0, me2 = 0;
                                    const newEnd2 = newStart + duration;
                                    for (let i=0; i<12; i++) { if (we + WPM[i] > newEnd2) { me2=i; break; } we+=WPM[i]; }
                                    const dayFrac2 = (newEnd2 - we) / WPM[me2];
                                    const day2 = Math.max(1, Math.round(dayFrac2 * 30));
                                    updateOverride(key, [mo, day], [me2, day2]);
                                  }
                                }
                                document.addEventListener(isTouch?"touchmove":"mousemove", onMove, {passive:false});
                                document.addEventListener(isTouch?"touchend":"mouseup", onUp);
                              }

                              return (
                                <div key={ti}
                                  onClick={e => { if (!window._wasDrag) openPopover(e, plant, origIdx, task, isOptCat); window._wasDrag=false; }}
                                  onMouseDown={startDrag}
                                  onTouchStart={startDrag}
                                  title={`${plant.name} · ${label} · ${MONTHS[effTask.start[0]]} ${effTask.start[1]}–${MONTHS[effTask.end[0]]} ${effTask.end[1]}${isDone?" · ✓ Done":""}${ov?" · rescheduled":""}`}
                                  style={{
                                    position:"absolute",left:start*CELL_W,width:w,height:18,top:(ROW_H-18)/2,
                                    background:color.bg,borderRadius:4,
                                    opacity:isOptCat?(isActive?0.55:0.35):isDone?0.42:(isActive?1:0.87),
                                    cursor:"grab",transition:"opacity 0.12s, transform 0.1s, left 0.1s, width 0.1s",
                                    transform:isActive?"scaleY(1.18)":"none",
                                    display:"flex",alignItems:"center",paddingLeft:4,overflow:"hidden",
                                    zIndex:isActive?5:1,
                                    boxShadow:isActive?"0 2px 10px rgba(0,0,0,0.22)":(ov?"0 0 0 1.5px #d97706":"none"),
                                  }}>
                                  {isDone && (
                                    <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none" }} preserveAspectRatio="none">
                                      <line x1="2" y1="90%" x2="98%" y2="10%" stroke="rgba(255,255,255,0.65)" strokeWidth="1.5"/>
                                    </svg>
                                  )}
                                  {isDone && w>=20 && (
                                    <div style={{ position:"absolute",right:3,top:"50%",transform:"translateY(-50%)",width:13,height:13,borderRadius:"50%",background:"rgba(255,255,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                                      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2.2 2.2 3.8-4" stroke="#16a34a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                    </div>
                                  )}
                                  <span style={{ fontSize:9,color:"#fff",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1,opacity:isDone?0.65:1 }}>
                                    {(end-start)>=4?label:""}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}

                <div style={{ position:"absolute",top:0,bottom:0,left:currentWeek*CELL_W,width:2,background:"#ef4444",opacity:0.85,pointerEvents:"none",zIndex:20 }}>
                  <div style={{ position:"absolute",top:2,left:-18,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,borderRadius:3,padding:"1px 4px",whiteSpace:"nowrap" }}>TODAY</div>
                </div>
              </div>
            </div>
          </div>

          <p style={{ fontSize:10,color:"#9ca3af",marginTop:8,textAlign:"center" }}>
            ☀️ Front yard · 🌿 Back deck · <strong>Click any bar</strong> to check it off · Red line = today · ☁ Synced via JSONBin
            <br/>Ed Hume Seeds · Frost: Front Mar 22/Nov 8 · Back Apr 1/Nov 1 · Cottage Lake WA 430ft
            <br/>🤔 Optional: click ✚ to commit · <button onClick={() => setShowSyncSettings(true)} style={{ fontSize:10,color:"#7c3aed",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",padding:0 }}>⚙ Sync settings</button>
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GardenGantt/>);
  </script>
</body>
</html>
