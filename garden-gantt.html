        { type: "Prune/Trim",      start: [2,22], end: [3,15], label: "Hard prune before growth" },
        { type: "Repot",           start: [3,1],  end: [3,22] },
        { type: "Transplant",      start: [4,1],  end: [4,22], label: "Move outside (after back LF)" },
        { type: "Fertilize",       start: [5,1],  end: [9,1],  label: "Weekly high-K feed" },
        { type: "Deadhead",        start: [5,1],  end: [9,30] },
        { type: "Overwinter Care", start: [10,1], end: [11,30], label: "Bring in before frost" },
      ]},
      { name: "Mint", category: "Established Plants", location: "back", notes: "Keep contained in pot!", tasks: [
        { type: "Repot",           start: [2,22], end: [3,22], label: "Divide and repot" },
        { type: "Harvest",         start: [4,1],  end: [10,31] },
        { type: "Prune/Trim",      start: [8,1],  end: [9,1],  label: "Cut back before flowering" },
        { type: "Overwinter Care", start: [10,15], end: [11,30], label: "Mulch or bring in" },
      ]},
      { name: "Hellebore x3", category: "Established Plants", location: "back", notes: "Shade · woodland perennial", tasks: [
        { type: "Prune/Trim", start: [0,15], end: [1,28], label: "Remove old leaves" },
        { type: "Fertilize",  start: [1,15], end: [2,28], label: "Top dress compost" },
        { type: "Harvest",    start: [1,15], end: [3,31], label: "Bloom period" },
      ]},
      { name: "Lavender Tree", category: "Established Plants", location: "front", notes: "Established · south-facing", tasks: [
        { type: "Prune/Trim", start: [2,22], end: [3,22], label: "Light prune (avoid old wood)" },
        { type: "Harvest",    start: [6,1],  end: [7,22], label: "Harvest flower spikes" },
        { type: "Prune/Trim", start: [7,22], end: [8,15], label: "Post-bloom tidy" },
      ]},
      { name: "Geranium Pelargonium", category: "Established Plants", location: "front", notes: "Tender pot plant", tasks: [
        { type: "Overwinter Care", start: [0,1],  end: [3,22], label: "Keep frost-free indoors" },
        { type: "Prune/Trim",      start: [2,22], end: [3,15], label: "Cut back leggy growth" },
        { type: "Repot",           start: [3,1],  end: [3,22] },
        { type: "Transplant",      start: [3,22], end: [4,22], label: "Move outside after LF" },
        { type: "Deadhead",        start: [5,1],  end: [9,30] },
        { type: "Overwinter Care", start: [10,8], end: [11,30], label: "Bring in before frost" },
      ]},
    ];

    const ALL_CATEGORIES  = ["Vegetables","Brassicas","Root Vegetables","Leafy Greens","Fruits","Flowers","Established Plants","Optional"];
    const FILT_CATEGORIES = ["All",...ALL_CATEGORIES];
    const TASK_TYPES      = ["All",...Object.keys(TASK_COLORS)];
    const LOCATIONS       = ["All","front (south)","back (north)"];

    function taskWeeks(task) {
      const s = monthToWeek(task.start[0], task.start[1]);
      const e = monthToWeek(task.end[0],   task.end[1]);
      return { start: s, end: Math.max(e, s + 1) };
    }

    function tKey(plantName, idx) { return `t:${plantName}:${idx}`; }

    // ── localStorage helpers ───────────────────────────────────────────────────
    function lsGet(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(_) { return fallback; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch(_) {}
    }

    // ── TaskPopover ────────────────────────────────────────────────────────────
    function TaskPopover({ plant, taskIndex, task, isOptional, isChecked, onToggle, onClose }) {
      const ref = useRef(null);
      const label = task.label || task.type;
      const color = TASK_COLORS[task.type]?.bg || "#64748b";

      useEffect(() => {
        const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
        setTimeout(() => document.addEventListener("mousedown", h), 0);
        return () => document.removeEventListener("mousedown", h);
      }, [onClose]);

      return (
        <div ref={ref} onClick={e => e.stopPropagation()} style={{
          background:"#fff", border:"1.5px solid #e5e7eb", borderRadius:10,
          boxShadow:"0 8px 32px rgba(0,0,0,0.2)", padding:"14px 16px 12px",
          minWidth:220, maxWidth:270, position:"relative",
        }}>
          <button onClick={onClose} style={{
            position:"absolute",top:8,right:10,background:"none",border:"none",
            cursor:"pointer",fontSize:18,color:"#9ca3af",lineHeight:1,padding:0,
          }}>×</button>

          <div style={{ fontSize:10, color:"#9ca3af", marginBottom:3, fontStyle:"italic" }}>
            {plant.location==="front"?"☀️":"🌿"} {plant.name}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:6 }}>
            <div style={{ width:10,height:10,borderRadius:3,background:color,flexShrink:0 }}/>
            <span style={{ fontSize:13,fontWeight:700,color:"#1c2b1a" }}>{label}</span>
          </div>
          <div style={{ fontSize:11, color:"#6b7259", marginBottom: plant.notes?8:12 }}>
            {MONTHS[task.start[0]]} {task.start[1]} – {MONTHS[task.end[0]]} {task.end[1]}
          </div>
          {plant.notes && (
            <div style={{ fontSize:10,color:"#9ca3af",marginBottom:12,borderTop:"1px solid #f3f4f6",paddingTop:8 }}>
              {plant.notes}
            </div>
          )}

          {!isOptional ? (
            <div onClick={onToggle} style={{
              display:"flex",alignItems:"center",gap:10,cursor:"pointer",
              background:isChecked?"#f0fdf4":"#fafaf7",
              border:`1.5px solid ${isChecked?"#16a34a":"#d1d5db"}`,
              borderRadius:8,padding:"9px 12px",transition:"all 0.15s",userSelect:"none",
            }}>
              <div style={{
                width:20,height:20,borderRadius:5,
                border:`2px solid ${isChecked?"#16a34a":"#d1d5db"}`,
                background:isChecked?"#16a34a":"#fff",
                display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,transition:"all 0.15s",
              }}>
                {isChecked && (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </div>
              <span style={{
                fontSize:12,fontWeight:600,
                color:isChecked?"#16a34a":"#374151",
                textDecoration:isChecked?"line-through":"none",
              }}>
                {isChecked?"Done ✓":"Mark as done"}
              </span>
            </div>
          ) : (
            <div style={{ fontSize:11,color:"#94a3b8",fontStyle:"italic" }}>
              Click ✚ in the plant label to commit to growing this plant first.
            </div>
          )}
        </div>
      );
    }

    // ── Main App ───────────────────────────────────────────────────────────────
    function GardenGantt() {
      const [categoryFilter, setCategoryFilter] = useState("All");
      const [taskFilter,     setTaskFilter]     = useState("All");
      const [locationFilter, setLocationFilter] = useState("All");
      const [search,         setSearch]         = useState("");
      const [showFrost,      setShowFrost]      = useState(true);
      const [showNotes,      setShowNotes]      = useState(false);

      const [promotedOptional, setPromotedOptional] = useState(() => lsGet("garden-promoted", {}));
      const [checkedTasks,     setCheckedTasks]     = useState(() => lsGet("garden-checked",  {}));
      const [popover,          setPopover]          = useState(null);

      const now = new Date();
      const currentWeek = Math.floor((now - new Date(now.getFullYear(),0,1)) / (7*24*60*60*1000));
      const CELL_W  = 14;
      const ROW_H   = 28;
      const LABEL_W = showNotes ? 280 : 175;

      // Persist on change
      useEffect(() => lsSet("garden-promoted", promotedOptional), [promotedOptional]);
      useEffect(() => lsSet("garden-checked",  checkedTasks),     [checkedTasks]);

      const toggleTask = useCallback((key) => {
        setCheckedTasks(prev => {
          const n = {...prev};
          if (n[key]) delete n[key]; else n[key] = true;
          return n;
        });
      }, []);

      const allActivePlants = useMemo(() => {
        const promoted = OPTIONAL_PLANTS.filter(p => promotedOptional[p.name])
          .map(p => ({...p, category: p.targetCategory}));
        return [...PLANTS, ...promoted];
      }, [promotedOptional]);

      const optionalPlants = useMemo(() =>
        OPTIONAL_PLANTS.filter(p => !promotedOptional[p.name]).map(p => ({...p, category:"Optional"})),
      [promotedOptional]);

      const combinedPlants = useMemo(() => [...allActivePlants, ...optionalPlants], [allActivePlants, optionalPlants]);

      const urgentPlants = useMemo(() =>
        combinedPlants.filter(p => p.tasks.some(t => t.label?.includes("in hand"))).map(p => p.name),
      [combinedPlants]);

      const filteredPlants = useMemo(() => combinedPlants.filter(p => {
        if (categoryFilter !== "All" && p.category !== categoryFilter) return false;
        if (locationFilter === "front (south)" && p.location !== "front") return false;
        if (locationFilter === "back (north)"  && p.location !== "back")  return false;
        if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
        if (taskFilter !== "All" && !p.tasks.some(t => t.type === taskFilter)) return false;
        return true;
      }), [combinedPlants, categoryFilter, taskFilter, locationFilter, search]);

      const totalTasks = useMemo(() => allActivePlants.reduce((s,p) => s + p.tasks.length, 0), [allActivePlants]);
      const doneTasks  = Object.keys(checkedTasks).length;

      function openPopover(e, plant, taskIdx, task, isOpt) {
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        const popH = 200;
        const y = rect.top - 10 > popH ? rect.top - popH - 4 : rect.bottom + 6;
        const x = Math.min(Math.max(rect.left, 8), window.innerWidth - 290);
        setPopover({ plant, taskIndex: taskIdx, task, isOptional: isOpt, x, y });
      }

      return (
        <div style={{ fontFamily:"Georgia,serif", background:"#fafaf7", minHeight:"100vh", padding:"18px 16px" }}
          onClick={() => setPopover(null)}>

          {popover && (
            <div style={{ position:"fixed", left:popover.x, top:popover.y, zIndex:1000 }}
              onClick={e => e.stopPropagation()}>
              <TaskPopover
                plant={popover.plant}
                taskIndex={popover.taskIndex}
                task={popover.task}
                isOptional={popover.isOptional}
                isChecked={!!checkedTasks[tKey(popover.plant.name, popover.taskIndex)]}
                onToggle={() => toggleTask(tKey(popover.plant.name, popover.taskIndex))}
                onClose={() => setPopover(null)}
              />
            </div>
          )}

          {/* Header */}
          <div style={{ marginBottom:14, display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div>
              <h1 style={{ fontSize:22, fontWeight:700, color:"#1c2b1a", margin:0 }}>🌱 Garden Gantt Calendar</h1>
              <p style={{ color:"#6b7259", fontSize:12, margin:"3px 0 0", fontStyle:"italic" }}>
                Zone 8b · Cottage Lake, WA · 430 ft · {combinedPlants.length} plants · Ed Hume Seeds
                &nbsp;·&nbsp;<span style={{ color:"#16a34a",fontWeight:600 }}>☀ Front yard</span> last frost Mar 22
                &nbsp;·&nbsp;<span style={{ color:"#0891b2",fontWeight:600 }}>🌿 Back deck</span> last frost Apr 1
              </p>
            </div>
            <div style={{
              background:doneTasks>0?"#f0fdf4":"#f8fafc",
              border:`1.5px solid ${doneTasks>0?"#16a34a":"#e5e7eb"}`,
              borderRadius:20, padding:"6px 14px",
              display:"flex", alignItems:"center", gap:8, flexShrink:0,
            }}>
              <span style={{ fontSize:11, color:doneTasks>0?"#16a34a":"#94a3b8", fontWeight:700 }}>
                ✓ {doneTasks} / {totalTasks} tasks done
              </span>
              <div style={{ width:80, height:6, borderRadius:3, background:"#e5e7eb", overflow:"hidden" }}>
                <div style={{
                  height:"100%", borderRadius:3, background:"#16a34a",
                  width:`${totalTasks?(doneTasks/totalTasks)*100:0}%`,
                  transition:"width 0.3s ease",
                }}/>
              </div>
              {doneTasks > 0 && (
                <button onClick={e => { e.stopPropagation(); setCheckedTasks({}); }}
                  style={{ fontSize:10,color:"#dc2626",background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline" }}>
                  reset
                </button>
              )}
            </div>
          </div>

          {urgentPlants.length > 0 && (
            <div style={{ background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:12,color:"#713f12" }}>
              <strong>⚠️ Pot up now!</strong> These starts are in hand:&nbsp;{urgentPlants.join(" · ")}
            </div>
          )}

          {/* Legend */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:10 }}>
            {Object.entries(TASK_COLORS).map(([type,c]) => (
              <div key={type} style={{ display:"flex",alignItems:"center",gap:4,fontSize:10,background:"#fff",border:"1px solid #e5e7eb",borderRadius:20,padding:"2px 8px" }}>
                <div style={{ width:8,height:8,borderRadius:2,background:c.bg }}/>
                <span style={{ color:"#374151" }}>{type}</span>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12, alignItems:"center" }}>
            <input placeholder="🔍 Search..." value={search} onChange={e => setSearch(e.target.value)}
              style={{ padding:"5px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:12,width:140,outline:"none",background:"#fff" }}/>
            <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
              {FILT_CATEGORIES.map(c => (
                <button key={c} onClick={() => setCategoryFilter(c)}
                  style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                    borderColor:categoryFilter===c?(CATEGORY_COLORS[c]||"#64748b"):"#d1d5db",
                    background:categoryFilter===c?(CAT_BG[c]||"#f1f5f9"):"#fff",
                    color:"#1c2b1a",fontWeight:categoryFilter===c?700:400 }}>
                  {c==="Optional"?"🤔 Optional":c}
                </button>
              ))}
            </div>
            <select value={taskFilter} onChange={e => setTaskFilter(e.target.value)}
              style={{ padding:"5px 8px",borderRadius:8,border:"1px solid #d1d5db",fontSize:11,background:"#fff",color:"#374151" }}>
              {TASK_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
            <select value={locationFilter} onChange={e => setLocationFilter(e.target.value)}
              style={{ padding:"5px 8px",borderRadius:8,border:"1px solid #d1d5db",fontSize:11,background:"#fff",color:"#374151" }}>
              {LOCATIONS.map(l => <option key={l}>{l}</option>)}
            </select>
            <button onClick={() => setShowFrost(f => !f)}
              style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                borderColor:showFrost?"#16a34a":"#d1d5db",background:showFrost?"#dcfce7":"#fff",
                color:showFrost?"#14532d":"#374151",fontWeight:showFrost?700:400 }}>
              🌡 Frost dates
            </button>
            <button onClick={() => setShowNotes(n => !n)}
              style={{ padding:"4px 10px",borderRadius:20,border:"1px solid",fontSize:11,cursor:"pointer",
                borderColor:showNotes?"#7c3aed":"#d1d5db",background:showNotes?"#ede9fe":"#fff",
                color:showNotes?"#4c1d95":"#374151",fontWeight:showNotes?700:400 }}>
              📋 Variety notes
            </button>
            <span style={{ fontSize:11,color:"#9ca3af" }}>{filteredPlants.length} plants shown</span>
          </div>

          {/* Grid */}
          <div style={{ background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"auto",boxShadow:"0 1px 6px rgba(0,0,0,0.07)" }}>
            <div style={{ display:"flex", minWidth: LABEL_W + TOTAL_WEEKS*CELL_W + 20 }}>

              {/* Label column */}
              <div style={{ width:LABEL_W, flexShrink:0, borderRight:"1px solid #e5e7eb" }}>
                <div style={{ height:40 }}/>
                {ALL_CATEGORIES.map(cat => {
                  const plants = filteredPlants.filter(p => p.category === cat);
                  if (!plants.length) return null;
                  const isOptCat = cat === "Optional";
                  return (
                    <div key={cat}>
                      <div style={{ height:22,background:CAT_BG[cat]||"#f1f5f9",display:"flex",alignItems:"center",
                        paddingLeft:10,fontSize:10,fontWeight:800,color:"#374151",
                        letterSpacing:"0.06em",textTransform:"uppercase",borderTop:"1px solid #e5e7eb",
                        borderLeft:"3px solid "+(CATEGORY_COLORS[cat]||"#94a3b8") }}>
                        {isOptCat?"🤔 Optional — click ✚ to plant this year":cat}
                      </div>
                      {plants.map(plant => {
                        const optDef     = OPTIONAL_PLANTS.find(o => o.name === plant.name);
                        const isOpt      = isOptCat && !!optDef;
                        const plantDone  = plant.tasks.filter((_,ti) => checkedTasks[tKey(plant.name,ti)]).length;
                        const plantTotal = plant.tasks.length;
                        const allDone    = !isOpt && plantDone === plantTotal;
                        return (
                          <div key={plant.name} style={{ height:ROW_H,display:"flex",alignItems:"center",
                            paddingLeft:10,borderBottom:"1px solid #f3f4f6",
                            background:allDone?"#f0fdf4":urgentPlants.includes(plant.name)?"#fefce8":isOpt?"#f8fafc":"transparent" }}>
                            {isOpt && (
                              <button title={`Plant this year → ${optDef.targetCategory}`}
                                onClick={e => { e.stopPropagation(); setPromotedOptional(prev=>({...prev,[plant.name]:true})); }}
                                style={{ flexShrink:0,marginRight:5,width:18,height:18,borderRadius:"50%",
                                  border:"1.5px solid #16a34a",background:"#f0fdf4",color:"#16a34a",
                                  fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",
                                  justifyContent:"center",fontWeight:900,padding:0 }}>
                                ✚
                              </button>
                            )}
                            <span style={{ fontSize:9,opacity:isOpt?0.5:0.6,marginRight:4,flexShrink:0 }}>
                              {plant.location==="front"?"☀️":"🌿"}
                            </span>
                            <div style={{ overflow:"hidden", flex:1 }}>
                              <div style={{
                                fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                                color:allDone?"#16a34a":isOpt?"#94a3b8":"#1c2b1a",
                                fontStyle:isOpt?"italic":"normal",
                                textDecoration:allDone?"line-through":"none",
                              }}>
                                {plant.name}{urgentPlants.includes(plant.name)?" ⚠️":""}{allDone?" ✓":""}
                              </div>
                              {isOpt && <div style={{ fontSize:9,color:"#cbd5e1" }}>→ {optDef.targetCategory} if planted</div>}
                              {!isOpt && plantDone>0 && !allDone && (
                                <div style={{ fontSize:9,color:"#16a34a" }}>{plantDone}/{plantTotal} done</div>
                              )}
                              {!isOpt && showNotes && plant.notes && (
                                <div style={{ fontSize:9,color:"#9ca3af",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2 }}>{plant.notes}</div>
                              )}
                              {isOpt && showNotes && plant.notes && (
                                <div style={{ fontSize:9,color:"#cbd5e1",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2 }}>{plant.notes}</div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              {/* Gantt bars column */}
              <div style={{ flex:1, overflowX:"auto", position:"relative" }}>
                {/* Month headers */}
                <div style={{ display:"flex",height:40,alignItems:"flex-end",borderBottom:"2px solid #e5e7eb",position:"sticky",top:0,background:"#fff",zIndex:10 }}>
                  {MONTHS.map((m,i) => (
                    <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,borderLeft:"1px solid #e5e7eb",paddingLeft:4,paddingBottom:6 }}>
                      <span style={{ fontSize:11,fontWeight:700,color:"#374151" }}>{m}</span>
                    </div>
                  ))}
                </div>

                {/* Frost overlays */}
                {showFrost && <>
                  <div style={{ position:"absolute",top:0,bottom:0,left:0,width:FRONT_LF*CELL_W,background:"rgba(22,163,74,0.05)",pointerEvents:"none",zIndex:0 }}/>
                  <div style={{ position:"absolute",top:0,bottom:0,left:FRONT_FF*CELL_W,right:0,background:"rgba(22,163,74,0.05)",pointerEvents:"none",zIndex:0 }}/>
                  {[
                    {x:FRONT_LF,color:"#16a34a",label:"LF Mar 22 ☀",top:2},
                    {x:FRONT_FF,color:"#16a34a",label:"FF Nov 8 ☀", top:2},
                    {x:BACK_LF, color:"#0891b2",label:"LF Apr 1 🌿",top:14},
                    {x:BACK_FF, color:"#0891b2",label:"FF Nov 1 🌿",top:14},
                  ].map(({x,color,label,top}) => (
                    <div key={label} style={{ position:"absolute",top:0,bottom:0,left:x*CELL_W,width:1,background:color,opacity:0.35,pointerEvents:"none",zIndex:1 }}>
                      <div style={{ position:"absolute",top,left:2,background:color,color:"#fff",fontSize:8,fontWeight:700,borderRadius:3,padding:"1px 3px",whiteSpace:"nowrap",opacity:0.9 }}>{label}</div>
                    </div>
                  ))}
                </>}

                {/* Category rows */}
                {ALL_CATEGORIES.map(cat => {
                  const plants = filteredPlants.filter(p => p.category === cat);
                  if (!plants.length) return null;
                  const isOptCat = cat === "Optional";
                  return (
                    <div key={cat}>
                      <div style={{ height:22,background:CAT_BG[cat]||"#f1f5f9",borderTop:"1px solid #e5e7eb",display:"flex" }}>
                        {MONTHS.map((m,i) => <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,borderLeft:"1px solid #e5e7eb" }}/>)}
                      </div>
                      {plants.map(plant => {
                        const tasksToShow = taskFilter==="All" ? plant.tasks : plant.tasks.filter(t => t.type===taskFilter);
                        return (
                          <div key={plant.name} style={{ height:ROW_H,position:"relative",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",
                            background:urgentPlants.includes(plant.name)?"#fefce8":isOptCat?"#f8fafc":"transparent" }}>
                            {MONTHS.map((m,i) => <div key={m} style={{ width:WPM[i]*CELL_W,flexShrink:0,height:"100%",borderLeft:"1px solid #f3f4f6",boxSizing:"border-box" }}/>)}
                            {tasksToShow.map((task, ti) => {
                              const origIdx  = plant.tasks.indexOf(task);
                              const key      = tKey(plant.name, origIdx);
                              const isDone   = !!checkedTasks[key];
                              const {start,end} = taskWeeks(task);
                              const color    = TASK_COLORS[task.type] || TASK_COLORS["Harvest"];
                              const label    = task.label || task.type;
                              const isActive = popover?.plant.name===plant.name && popover?.taskIndex===origIdx;
                              const w        = (end-start)*CELL_W - 2;
                              return (
                                <div key={ti}
                                  onClick={e => openPopover(e, plant, origIdx, task, isOptCat)}
                                  title={`${plant.name} · ${label} · ${MONTHS[task.start[0]]} ${task.start[1]}–${MONTHS[task.end[0]]} ${task.end[1]}${isDone?" · ✓ Done":""}`}
                                  style={{
                                    position:"absolute",left:start*CELL_W,width:w,
                                    height:18,top:(ROW_H-18)/2,
                                    background:color.bg,borderRadius:4,
                                    opacity:isOptCat?(isActive?0.55:0.35):isDone?0.42:(isActive?1:0.87),
                                    cursor:"pointer",
                                    transition:"opacity 0.12s, transform 0.1s",
                                    transform:isActive?"scaleY(1.18)":"none",
                                    display:"flex",alignItems:"center",paddingLeft:4,overflow:"hidden",
                                    zIndex:isActive?5:1,
                                    boxShadow:isActive?"0 2px 10px rgba(0,0,0,0.22)":"none",
                                  }}>
                                  {isDone && (
                                    <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none" }} preserveAspectRatio="none">
                                      <line x1="2" y1="90%" x2="98%" y2="10%" stroke="rgba(255,255,255,0.65)" strokeWidth="1.5"/>
                                    </svg>
                                  )}
                                  {isDone && w>=20 && (
                                    <div style={{
                                      position:"absolute",right:3,top:"50%",transform:"translateY(-50%)",
                                      width:13,height:13,borderRadius:"50%",
                                      background:"rgba(255,255,255,0.9)",
                                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                                    }}>
                                      <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
                                        <path d="M1.5 4.5l2.2 2.2 3.8-4" stroke="#16a34a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                                      </svg>
                                    </div>
                                  )}
                                  <span style={{
                                    fontSize:9,color:"#fff",fontWeight:700,
                                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1,
                                    opacity:isDone?0.65:1,
                                  }}>
                                    {(end-start)>=4?label:""}
                                  </span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}

                {/* Today line */}
                <div style={{ position:"absolute",top:0,bottom:0,left:currentWeek*CELL_W,width:2,background:"#ef4444",opacity:0.85,pointerEvents:"none",zIndex:20 }}>
                  <div style={{ position:"absolute",top:2,left:-18,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,borderRadius:3,padding:"1px 4px",whiteSpace:"nowrap" }}>TODAY</div>
                </div>
              </div>
            </div>
          </div>

          <p style={{ fontSize:10,color:"#9ca3af",marginTop:8,textAlign:"center" }}>
            ☀️ Front yard · 🌿 Back deck · <strong>Click any bar</strong> to check it off · Red line = today · Progress saved in browser
            <br/>Ed Hume Seeds · Frost: Front Mar 22/Nov 8 · Back Apr 1/Nov 1 · Cottage Lake WA 430ft
            <br/>🤔 Optional: click ✚ to commit to growing this year
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GardenGantt/>);
  </script>
</body>
</html>
